// gzip helpers using the browser-native Compression Streams API
async function _pedroGzip(str) {
    var data = new TextEncoder().encode(str);
    var cs = new CompressionStream("gzip");
    var writer = cs.writable.getWriter(); writer.write(data); writer.close();
    var buf = await new Response(cs.readable).arrayBuffer();
    // base64-encode the compressed bytes
    var bytes = new Uint8Array(buf), bin = "";
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return "PZ1:" + btoa(bin); // prefix marks a compressed payload
}
async function _pedroGunzip(b64) {
    var bin = atob(b64), bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    var ds = new DecompressionStream("gzip");
    var writer = ds.writable.getWriter(); writer.write(bytes); writer.close();
    var buf = await new Response(ds.readable).arrayBuffer();
    return new TextDecoder().decode(buf);
}

function pedroImport() {

    var input = document.createElement("input");

    input.accept = "application/json,.json";
    input.onchange = function(e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function() {
            try {
                var parsed = JSON.parse(String(reader.result));
                var data = parsed.data || parsed; // support both new and old shapes
                var n = 0;
                Object.keys(data).forEach(function(k){ if (k.charAt && k.charAt(0)==='p') { try { localStorage.setItem(k, data[k]); n++; } catch(e){} } });
                pedroImportDone(true, n);
            } catch(err) { pedroImportDone(false, 0); }
        };
        reader.onerror = function(){ pedroImportDone(false, 0); };
        reader.readAsText(file);
    };
    input.click();
}

async function pedroLiveSearch(prompt, sys, maxT) {

                body: JSON.stringify({ model: "sonar", messages: [{ role: "system", content: system }, { role: "user", content: prompt }], max_tokens: maxT || 2000 }),
            });
            var pd = await pr.json();
            if (pd.choices && pd.choices[0] && pd.choices[0].message) {
                try { window._lastEngine = "perplexity"; window.dispatchEvent(new CustomEvent("pedro-engine", { detail: "perplexity" })); } catch(e){}

}

async function pedroAskImage(base64Data, mediaType, prompt) {
    var key = localStorage.getItem('pedro_api_key') || '';
    if (!key) return "Add your Anthropic API key (⚙ KEYS) to use photo analysis.";
    try {
        var res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
            body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 1500,
                messages: [{ role: "user", content: [
                    { type: "image", source: { type: "base64", media_type: mediaType, data: base64Data } },
                    { type: "text", text: prompt }
                ]}]
            })
        });
        var d = await res.json();
        if (d && d.content && d.content[0] && d.content[0].text) return d.content[0].text;
        if (d && d.error) return "Error: " + (d.error.message || "vision request failed");
        return "Could not read the image.";
    } catch (e) { return "Error: " + (e.message || "vision request failed"); }
}

function pedroBackupNoteHTML() {

    }
    var ago = Date.now() - ts;
    var days = Math.floor(ago / 86400000);
    var hrs = Math.floor(ago / 3600000);
    var when, color, bg, bd;
    if (ago < 3600000) { when = "just now"; }
    else if (hrs < 24) { when = hrs + (hrs === 1 ? " hour" : " hours") + " ago"; }
    else { when = days + (days === 1 ? " day" : " days") + " ago"; }
    var d = new Date(ts);
    var dateStr = d.toLocaleDateString() + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    if (ago > 3 * 86400000) { color = "#ffa500"; bg = "rgba(255,165,0,0.08)"; bd = "rgba(255,165,0,0.4)"; }
    else { color = "#39ff14"; bg = "rgba(57,255,20,0.06)"; bd = "rgba(57,255,20,0.3)"; }

// ── NOTIFICATIONS: crypto watchlist moves, habit/streak nudges ───────────────
function pedroNotify(title, body, tag) {
    // de-dupe by tag within the last 3h
    try {
        var seen = JSON.parse(localStorage.getItem("pedro_notif_seen") || "{}");
        var now = Date.now();
        if (seen[tag] && now - seen[tag] < 3 * 3600000) return;
        seen[tag] = now; localStorage.setItem("pedro_notif_seen", JSON.stringify(seen));
    } catch (e) {}
    // queue into an in-app feed
    try {
        var feed = JSON.parse(localStorage.getItem("pedro_notif_feed") || "[]");
        feed.unshift({ title: title, body: body, at: Date.now() });
        localStorage.setItem("pedro_notif_feed", JSON.stringify(feed.slice(0, 30)));
    } catch (e) {}
    // browser notification if granted
    try {
        if (typeof Notification !== "undefined" && Notification.permission === "granted") {
            new Notification(title, { body: body, icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%A4%96%3C/text%3E%3C/svg%3E" });
        }
    } catch (e) {}
    // always show an on-screen toast banner
    pedroNotifBanner(title, body);
}

    b.onclick = function () { b.remove(); };
    document.body.appendChild(b);
    setTimeout(function () { if (b.parentNode) b.remove(); }, 8000);
}

function pedroCheckCrypto() {
    try {
        var watchRaw = localStorage.getItem("pwatch");
        var holdRaw = localStorage.getItem("phold");
        var watch = watchRaw ? JSON.parse(watchRaw) : ["bitcoin", "ethereum", "solana"];
        var hold = holdRaw ? JSON.parse(holdRaw) : [];
        var ids = watch.concat(hold.map(function (h) { return h.coin; })).filter(Boolean);
        ids = ids.filter(function (v, i) { return ids.indexOf(v) === i; });
        if (!ids.length) return;
        fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=" + ids.join(",") + "&price_change_percentage=24h")
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (!Array.isArray(data)) return;
                data.forEach(function (c) {
                    var ch = c.price_change_percentage_24h;
                    if (ch == null) return;
                    if (Math.abs(ch) >= 2) {
                        var dir = ch >= 0 ? "▲" : "▼";
                        var sym = c.symbol.toUpperCase();
                        var price = c.current_price >= 1 ? c.current_price.toLocaleString() : c.current_price;
                        // tag includes the rounded direction+bucket so a fresh move re-fires but not every minute
                        var bucket = Math.round(ch);
                        pedroNotify(dir + " " + sym + " " + (ch >= 0 ? "+" : "") + ch.toFixed(1) + "%", sym + " is " + (ch >= 0 ? "up" : "down") + " to $" + price + " over 24h.", "crypto_" + sym + "_" + bucket);
                    }
                });
            }).catch(function () {});
    } catch (e) {}
}
window.pedroCheckCrypto = pedroCheckCrypto;

            return;
        }
        document.getElementById('root').innerHTML = '<div style="color:#00d4ff;font-family:monospace;padding:40px;text-align:center;">Loading Pedro...</div>';
        setTimeout(_mountPedro, 300); return;
    }
    try {
        const _root = ReactDOM.createRoot(document.getElementById('root'));
        _root.render(React.createElement(App));
        setTimeout(function() {
            checkApiKey();
            if (typeof getSyncCode === 'function' && getSyncCode()) {

            document.body.appendChild(bar);
        }, 500);
    } catch(e) { document.getElementById('root').innerHTML = '<div style="color:#ff3a3a;font-family:monospace;padding:40px;">Error: ' + e.message + '</div>'; }
}
